name: Toolchain smoke test

# Validates that the published pymcu-rp2040-toolchain stub works correctly
# on all target platforms: install from PyPI, let get_tool() auto-download the
# binary wheel from GitHub Releases, run the full pipeline tests.
#
# NOTE: `release: published` does NOT work when the release is created by a
# workflow using GITHUB_TOKEN. Use `workflow_run` after build-wheels.yml.

on:
  workflow_run:
    workflows: ["Build pymcu-rp2040-toolchain wheels"]
    types: [completed]
  push:
    branches: [master, main]
    paths:
      - "src/**"
      - "tests/**"
      - ".github/workflows/smoke-test.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to test (e.g. 22.1.7.post4, default: latest)"
        required: false
        default: ""

jobs:
  smoke:
    name: Smoke (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
          - name: linux-arm64
            os: ubuntu-24.04-arm
          - name: macos-arm64
            os: macos-latest
          - name: windows-x64
            os: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Wait for PyPI propagation
        if: github.event_name == 'workflow_run'
        run: sleep 240

      - name: Resolve target version
        id: version
        shell: bash
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          if [[ "$TAG" =~ ^v(.+)$ ]]; then
            echo "pin=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          else
            echo "pin=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install pymcu-rp2040-toolchain from PyPI
        shell: bash
        run: |
          uv venv .venv
          PIN="${{ steps.version.outputs.pin }}"
          if [ -n "$PIN" ]; then
            SPEC="pymcu-rp2040-toolchain==$PIN"
          else
            SPEC="pymcu-rp2040-toolchain"
          fi
          echo "Installing: $SPEC"
          for i in 1 2 3; do
            uv pip install --python .venv "$SPEC" pytest && break
            echo "Attempt $i failed — waiting 30s..."
            sleep 30
          done
          uv run --python .venv python -c "
          from importlib.metadata import version
          print('Installed version:', version('pymcu-rp2040-toolchain'))
          "

      - name: Run smoke tests
        # get_tool() in the test module guard triggers the auto-download from
        # GitHub Releases when no binaries are bundled (stub/sdist install).
        run: uv run --python .venv pytest tests/ -v --tb=short
