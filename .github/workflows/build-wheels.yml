name: Build pymcu-rp2040-toolchain wheels

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  # Keep in sync with LLVM_VERSION in __init__.py and version in pyproject.toml.
  LLVM_VERSION: "22.1.7"

jobs:
  # ---------------------------------------------------------------------------
  # One job per platform. Each downloads the official prebuilt LLVM tarball,
  # slims it to the five required tools + shared libs, then packages a wheel.
  #
  # Asset names for llvmorg-22.1.7:
  #   Linux  x64   -> LLVM-22.1.7-Linux-X64.tar.xz
  #   Linux  arm64 -> LLVM-22.1.7-Linux-ARM64.tar.xz
  #   macOS arm64  -> LLVM-22.1.7-macOS-ARM64.tar.xz
  #   Windows x64  -> clang+llvm-22.1.7-x86_64-pc-windows-msvc.tar.xz
  #
  # NOTE on wheel size: libLLVM.{dylib,so} is 200-300 MB of code even without
  # debug symbols (official LLVM releases are already release-stripped). Binary
  # wheels are therefore too large for PyPI's 100 MB per-file limit and are
  # published to GitHub Releases instead (see publish-github-release).
  # PyPI receives only the pure-Python sdist stub (see publish-pypi).
  # ---------------------------------------------------------------------------
  package:
    name: Package ${{ matrix.name }} wheel
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runs-on: ubuntu-latest
            asset: LLVM-22.1.7-Linux-X64.tar.xz
            wheel_tag: manylinux_2_17_x86_64
          - name: linux-arm64
            runs-on: ubuntu-24.04-arm
            asset: LLVM-22.1.7-Linux-ARM64.tar.xz
            wheel_tag: manylinux_2_17_aarch64
          - name: macos-arm64
            runs-on: macos-latest
            asset: LLVM-22.1.7-macOS-ARM64.tar.xz
            wheel_tag: macosx_14_0_arm64
          - name: windows-x64
            runs-on: windows-latest
            asset: clang+llvm-22.1.7-x86_64-pc-windows-msvc.tar.xz
            wheel_tag: win_amd64

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6

      - name: Cache LLVM archive
        id: llvm-cache
        uses: actions/cache@v4
        with:
          path: llvm-archive/
          key: llvm-${{ env.LLVM_VERSION }}-${{ matrix.asset }}

      - name: Download LLVM ${{ env.LLVM_VERSION }} (${{ matrix.name }})
        if: steps.llvm-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p llvm-archive
          URL="https://github.com/llvm/llvm-project/releases/download/llvmorg-${LLVM_VERSION}/${{ matrix.asset }}"
          echo "Downloading $URL"
          curl -fL --retry 3 -o llvm-archive/llvm.tar.xz "$URL"

      - name: Extract LLVM
        shell: bash
        run: |
          mkdir -p llvm-extracted
          tar -xf llvm-archive/llvm.tar.xz -C llvm-extracted --strip-components=1

      - name: Stage the five tools (+ shared libs)
        shell: bash
        run: bash scripts/stage-llvm.sh llvm-extracted staged

      - name: Build wheel
        shell: bash
        env:
          RP2040T_TOOLCHAIN_DIR: ${{ github.workspace }}/staged
          WHEEL_PLATFORM_TAG: ${{ matrix.wheel_tag }}
        run: uv build --wheel

      - name: Report wheel size
        shell: bash
        run: du -sh dist/*.whl

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.name }}
          path: dist/*.whl

  # ---------------------------------------------------------------------------
  # Collect all wheels, build the binary-free sdist, smoke test, checksums.
  # ---------------------------------------------------------------------------
  collect-and-release:
    name: Collect wheels and smoke test
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist/
          merge-multiple: true

      - name: Build sdist (no binaries — published to PyPI)
        run: uv build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/*.tar.gz

      - name: Smoke test (Linux x64 wheel)
        run: |
          WHEEL=$(ls dist/pymcu_rp2040_toolchain-*-manylinux_2_17_x86_64.whl | head -1)
          uv run --with "$WHEEL" python -c "
          import pymcu_rp2040_toolchain as w
          import subprocess
          assert w.is_installed(), f'missing: {w.missing_tools()}'
          opt = w.get_tool('opt')
          print('opt:', opt)
          out = subprocess.run([str(opt), '--version'], capture_output=True, text=True)
          assert out.returncode == 0, out.stderr
          print('Smoke test passed.')
          "

      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum *.whl *.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Upload SHA256SUMS artifact
        uses: actions/upload-artifact@v4
        with:
          name: sha256sums
          path: dist/SHA256SUMS

      - name: List artifacts
        run: ls -lh dist/

  # ---------------------------------------------------------------------------
  # Binary wheels -> GitHub Release (no per-file size limit).
  # Users can pip-install a specific wheel directly:
  #   pip install https://github.com/<owner>/pymcu-rp2040-toolchain/releases/
  #               download/v22.1.7/pymcu_rp2040_toolchain-22.1.7-py3-none-
  #               manylinux_2_17_x86_64.whl
  # Or let the Rp2040LlvmToolchain driver auto-download LLVM tools to
  # ~/.pymcu/tools/ on first use via _fetch.py.
  # Fires ONLY on tag pushes (v*). workflow_dispatch never triggers this job.
  # ---------------------------------------------------------------------------
  publish-github-release:
    name: Publish binary wheels to GitHub Releases
    needs: collect-and-release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist/
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          name: sha256sums
          path: dist/

      - name: Create or update GitHub Release and attach wheels
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          NOTES="## Binary wheels — LLVM ${LLVM_VERSION}

          Binary wheels are too large for PyPI (300+ MB each). Install directly:

          \`\`\`bash
          # Linux x86-64
          pip install https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/pymcu_rp2040_toolchain-${LLVM_VERSION}-py3-none-manylinux_2_17_x86_64.whl

          # Linux arm64
          pip install https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/pymcu_rp2040_toolchain-${LLVM_VERSION}-py3-none-manylinux_2_17_aarch64.whl

          # macOS Apple Silicon
          pip install https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/pymcu_rp2040_toolchain-${LLVM_VERSION}-py3-none-macosx_14_0_arm64.whl

          # Windows x86-64
          pip install https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/pymcu_rp2040_toolchain-${LLVM_VERSION}-py3-none-win_amd64.whl
          \`\`\`

          Or pre-fetch tools to \`~/.pymcu/tools/\` without a binary wheel:
          \`\`\`bash
          python -m pymcu_rp2040_toolchain fetch --cache
          \`\`\`"

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "Release $TAG already exists — uploading assets only."
            gh release upload "$TAG" dist/*.whl dist/SHA256SUMS \
              --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "pymcu-rp2040-toolchain ${TAG}" \
              --notes "$NOTES" \
              dist/*.whl dist/SHA256SUMS
          fi

  # ---------------------------------------------------------------------------
  # Pure-Python stub (sdist only) -> PyPI via OIDC trusted publishing.
  # The stub makes the package discoverable via pip; tools are resolved at
  # runtime from the wheel bundle, the cache, or PATH.
  # Fires ONLY on tag pushes (v*). workflow_dispatch never triggers this job.
  # ---------------------------------------------------------------------------
  publish-pypi:
    name: Publish stub to PyPI
    needs: collect-and-release
    runs-on: ubuntu-latest
    environment: release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-sdist
          path: dist/

      - uses: astral-sh/setup-uv@v6

      - name: Publish stub to PyPI
        run: uv publish dist/*.tar.gz
