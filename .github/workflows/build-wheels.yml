name: Build pymcu-rp2040-toolchain wheels

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  # LLVM release the wheels bundle. Keep in sync with LLVM_VERSION in
  # src/pymcu_rp2040_toolchain/__init__.py and [project].version in pyproject.
  LLVM_VERSION: "19.1.7"

jobs:
  # ---------------------------------------------------------------------------
  # One job per platform: download the official LLVM release, slim it down to
  # the five tools (+ shared libs) with scripts/stage-llvm.sh, then build a
  # platform-tagged wheel. All platforms use upstream prebuilt LLVM, so there
  # is no from-source build (unlike avr-gcc-build's Linux job).
  # ---------------------------------------------------------------------------
  package:
    name: Package ${{ matrix.name }} wheel
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # `suffix` is the OS-arch part of the asset name:
          # LLVM-<LLVM_VERSION>-<suffix>
          - name: linux-x64
            runs-on: ubuntu-latest
            suffix: Linux-X64.tar.xz
            wheel_tag: manylinux_2_17_x86_64
          - name: macos-arm64
            runs-on: macos-latest
            suffix: macOS-ARM64.tar.xz
            wheel_tag: macosx_14_0_arm64
          - name: windows-x64
            runs-on: windows-latest
            suffix: Windows-X64.tar.xz
            wheel_tag: win_amd64
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Cache LLVM release archive
        id: llvm-cache
        uses: actions/cache@v4
        with:
          path: llvm-archive/
          key: llvm-${{ env.LLVM_VERSION }}-${{ matrix.suffix }}

      - name: Download LLVM ${{ env.LLVM_VERSION }} (${{ matrix.name }})
        if: steps.llvm-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p llvm-archive
          ASSET="LLVM-${LLVM_VERSION}-${{ matrix.suffix }}"
          URL="https://github.com/llvm/llvm-project/releases/download/llvmorg-${LLVM_VERSION}/${ASSET}"
          echo "Downloading $URL"
          curl -fL --retry 3 -o "llvm-archive/llvm.tar.xz" "$URL"

      - name: Extract LLVM
        shell: bash
        run: |
          mkdir -p llvm-extracted
          tar -xf llvm-archive/llvm.tar.xz -C llvm-extracted --strip-components=1

      - name: Stage the five tools (+ shared libs)
        shell: bash
        run: bash scripts/stage-llvm.sh llvm-extracted staged

      - name: Build wheel
        shell: bash
        env:
          RP2040T_TOOLCHAIN_DIR: ${{ github.workspace }}/staged
          WHEEL_PLATFORM_TAG: ${{ matrix.wheel_tag }}
        run: uv build --wheel

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.name }}
          path: dist/*.whl

  # ---------------------------------------------------------------------------
  # Collect wheels, build the (binary-free) sdist, smoke test, checksums.
  # ---------------------------------------------------------------------------
  collect-and-release:
    name: Collect wheels and smoke test
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist/
          merge-multiple: true

      - name: Build sdist (no binaries)
        run: uv build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/*.tar.gz
          retention-days: 1

      - name: Smoke test (Linux wheel)
        run: |
          WHEEL=$(ls dist/pymcu_rp2040_toolchain-*-manylinux_2_17_x86_64.whl | head -1)
          uv run --with "$WHEEL" python -c "
          import pymcu_rp2040_toolchain as w
          import subprocess
          assert w.is_installed(), f'missing: {w.missing_tools()}'
          opt = w.get_tool('opt')
          print('opt:', opt)
          out = subprocess.run([str(opt), '--version'], capture_output=True, text=True)
          assert out.returncode == 0, out.stderr
          print('Smoke test passed.')
          "

      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum *.whl *.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: List artifacts
        run: ls -lh dist/

  # ---------------------------------------------------------------------------
  # Publish to public PyPI (trusted publishing, on tag only).
  # ---------------------------------------------------------------------------
  publish-pypi:
    name: Publish to PyPI
    needs: collect-and-release
    runs-on: ubuntu-latest
    environment: release
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist/
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: dist-sdist
          path: dist/
      - uses: astral-sh/setup-uv@v6
      - name: Publish to PyPI
        run: uv publish dist/*

  # ---------------------------------------------------------------------------
  # Publish to the private PyPI index over headscale (mirrors avr-gcc-build).
  # ---------------------------------------------------------------------------
  publish-private:
    name: Publish to private PyPI
    needs: collect-and-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist/
          merge-multiple: true
      - name: Connect to headscale network
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.HEADSCALE_AUTH_KEY }}
          args: --login-server ${{ secrets.HEADSCALE_URL }}
      - uses: astral-sh/setup-uv@v6
      - name: Publish to private registry (Gitea)
        run: |
          uv publish \
            --publish-url "${{ secrets.PRIVATE_PYPI_URL }}" \
            --username "${{ secrets.PRIVATE_PYPI_USERNAME }}" \
            --password "${{ secrets.PRIVATE_PYPI_TOKEN }}" \
            dist/*
