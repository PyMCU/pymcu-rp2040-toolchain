name: Build pymcu-rp2040-toolchain wheels

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  # Keep in sync with LLVM_VERSION in __init__.py and version in pyproject.toml.
  LLVM_VERSION: "22.1.7"

jobs:
  # ---------------------------------------------------------------------------
  # One job per platform. Each downloads the official prebuilt LLVM tarball,
  # slims it to the five required tools + shared libs, then packages a wheel.
  #
  # Asset names for llvmorg-22.1.7:
  #   Linux  x64  -> LLVM-22.1.7-Linux-X64.tar.xz
  #   macOS arm64 -> LLVM-22.1.7-macOS-ARM64.tar.xz
  #   Windows x64 -> clang+llvm-22.1.7-x86_64-pc-windows-msvc.tar.xz
  # ---------------------------------------------------------------------------
  package:
    name: Package ${{ matrix.name }} wheel
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runs-on: ubuntu-latest
            asset: LLVM-22.1.7-Linux-X64.tar.xz
            wheel_tag: manylinux_2_17_x86_64
          - name: macos-arm64
            runs-on: macos-latest
            asset: LLVM-22.1.7-macOS-ARM64.tar.xz
            wheel_tag: macosx_14_0_arm64
          - name: windows-x64
            runs-on: windows-latest
            asset: clang+llvm-22.1.7-x86_64-pc-windows-msvc.tar.xz
            wheel_tag: win_amd64

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6

      - name: Cache LLVM archive
        id: llvm-cache
        uses: actions/cache@v4
        with:
          path: llvm-archive/
          key: llvm-${{ env.LLVM_VERSION }}-${{ matrix.asset }}

      - name: Download LLVM ${{ env.LLVM_VERSION }} (${{ matrix.name }})
        if: steps.llvm-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p llvm-archive
          URL="https://github.com/llvm/llvm-project/releases/download/llvmorg-${LLVM_VERSION}/${{ matrix.asset }}"
          echo "Downloading $URL"
          curl -fL --retry 3 -o llvm-archive/llvm.tar.xz "$URL"

      - name: Extract LLVM
        shell: bash
        run: |
          mkdir -p llvm-extracted
          tar -xf llvm-archive/llvm.tar.xz -C llvm-extracted --strip-components=1

      - name: Stage the five tools (+ shared libs)
        shell: bash
        run: bash scripts/stage-llvm.sh llvm-extracted staged

      - name: Build wheel
        shell: bash
        env:
          RP2040T_TOOLCHAIN_DIR: ${{ github.workspace }}/staged
          WHEEL_PLATFORM_TAG: ${{ matrix.wheel_tag }}
        run: uv build --wheel

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.name }}
          path: dist/*.whl

  # ---------------------------------------------------------------------------
  # Collect all wheels, build the binary-free sdist, smoke test, checksums.
  # ---------------------------------------------------------------------------
  collect-and-release:
    name: Collect wheels and smoke test
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist/
          merge-multiple: true

      - name: Build sdist (no binaries)
        run: uv build --sdist

      - name: Smoke test (Linux wheel)
        run: |
          WHEEL=$(ls dist/pymcu_rp2040_toolchain-*-manylinux_2_17_x86_64.whl | head -1)
          uv run --with "$WHEEL" python -c "
          import pymcu_rp2040_toolchain as w
          import subprocess
          assert w.is_installed(), f'missing: {w.missing_tools()}'
          opt = w.get_tool('opt')
          print('opt:', opt)
          out = subprocess.run([str(opt), '--version'], capture_output=True, text=True)
          assert out.returncode == 0, out.stderr
          print('Smoke test passed.')
          "

      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum *.whl *.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: List artifacts
        run: ls -lh dist/

  # ---------------------------------------------------------------------------
  # Publish to PyPI via OIDC trusted publishing (no stored token required).
  # Fires ONLY on tag pushes (v*). workflow_dispatch never triggers this job.
  # ---------------------------------------------------------------------------
  publish-pypi:
    name: Publish to PyPI
    needs: collect-and-release
    runs-on: ubuntu-latest
    environment: release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist/
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          name: dist-sdist
          path: dist/

      - uses: astral-sh/setup-uv@v6

      - name: Publish to PyPI
        run: uv publish dist/*
