name: Build pymcu-rp2040-toolchain wheels

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  # Keep in sync with LLVM_VERSION in __init__.py and version in pyproject.toml.
  LLVM_VERSION: "19.1.7"

jobs:
  # ---------------------------------------------------------------------------
  # Linux x64 and macOS arm64: download the official .tar.xz, slim it with
  # scripts/stage-llvm.sh, then build a platform-tagged wheel.
  # ---------------------------------------------------------------------------
  package-unix:
    name: Package ${{ matrix.name }} wheel
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runs-on: ubuntu-latest
            suffix: Linux-X64.tar.xz
            wheel_tag: manylinux_2_17_x86_64
          - name: macos-arm64
            runs-on: macos-latest
            suffix: macOS-ARM64.tar.xz
            wheel_tag: macosx_14_0_arm64
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6

      - name: Cache LLVM archive
        id: llvm-cache
        uses: actions/cache@v4
        with:
          path: llvm-archive/
          key: llvm-${{ env.LLVM_VERSION }}-${{ matrix.suffix }}

      - name: Download LLVM ${{ env.LLVM_VERSION }}
        if: steps.llvm-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p llvm-archive
          ASSET="LLVM-${LLVM_VERSION}-${{ matrix.suffix }}"
          URL="https://github.com/llvm/llvm-project/releases/download/llvmorg-${LLVM_VERSION}/${ASSET}"
          echo "Downloading $URL"
          curl -fL --retry 3 -o llvm-archive/llvm.tar.xz "$URL"

      - name: Extract LLVM
        run: |
          mkdir -p llvm-extracted
          tar -xf llvm-archive/llvm.tar.xz -C llvm-extracted --strip-components=1

      - name: Stage the five tools (+ shared libs)
        run: bash scripts/stage-llvm.sh llvm-extracted staged

      - name: Build wheel
        env:
          RP2040T_TOOLCHAIN_DIR: ${{ github.workspace }}/staged
          WHEEL_PLATFORM_TAG: ${{ matrix.wheel_tag }}
        run: uv build --wheel

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.name }}
          path: dist/*.whl

  # ---------------------------------------------------------------------------
  # Windows x64: the official LLVM Windows asset is an NSIS .exe installer,
  # not a tarball. Install it silently, then copy the five tools to staged/bin.
  # ---------------------------------------------------------------------------
  package-windows-x64:
    name: Package windows-x64 wheel
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6

      - name: Cache LLVM installer
        id: llvm-cache
        uses: actions/cache@v4
        with:
          path: llvm-archive/
          key: llvm-${{ env.LLVM_VERSION }}-Windows-X64.exe

      - name: Download LLVM ${{ env.LLVM_VERSION }} installer
        if: steps.llvm-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -Force -ItemType Directory llvm-archive | Out-Null
          $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-$env:LLVM_VERSION/LLVM-$env:LLVM_VERSION-Windows-X64.exe"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile llvm-archive\llvm.exe -UseBasicParsing

      - name: Install LLVM silently
        shell: pwsh
        run: |
          Write-Host "Installing LLVM to C:\LLVM ..."
          Start-Process -Wait -FilePath "llvm-archive\llvm.exe" -ArgumentList '/S', '/D=C:\LLVM'
          Write-Host "Done."
          Get-ChildItem C:\LLVM\bin | Select-Object -First 10

      - name: Stage the five tools
        shell: pwsh
        run: |
          $tools  = @("opt","llc","llvm-mc","ld.lld","llvm-objcopy")
          $srcBin = "C:\LLVM\bin"
          $dstBin = "staged\bin"
          New-Item -Force -ItemType Directory $dstBin | Out-Null
          foreach ($t in $tools) {
            $src = Join-Path $srcBin "$t.exe"
            if (-not (Test-Path $src)) {
              Write-Error "Required tool not found: $src"
              exit 1
            }
            Copy-Item $src $dstBin
            Write-Host "  + $t.exe"
          }
          # Copy DLLs that the tools load at runtime (live next to the .exe on Windows).
          foreach ($dll in (Get-ChildItem "$srcBin\LLVM*.dll", "$srcBin\libLLVM*.dll" -ErrorAction SilentlyContinue)) {
            Copy-Item $dll.FullName $dstBin
            Write-Host "  + $($dll.Name)"
          }

      - name: Build wheel
        shell: pwsh
        env:
          RP2040T_TOOLCHAIN_DIR: ${{ github.workspace }}\staged
          WHEEL_PLATFORM_TAG: win_amd64
        run: uv build --wheel

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-windows-x64
          path: dist/*.whl

  # ---------------------------------------------------------------------------
  # Collect all wheels, build the binary-free sdist, smoke test, checksums.
  # ---------------------------------------------------------------------------
  collect-and-release:
    name: Collect wheels and smoke test
    needs: [package-unix, package-windows-x64]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist/
          merge-multiple: true

      - name: Build sdist (no binaries)
        run: uv build --sdist

      - name: Smoke test (Linux wheel)
        run: |
          WHEEL=$(ls dist/pymcu_rp2040_toolchain-*-manylinux_2_17_x86_64.whl | head -1)
          uv run --with "$WHEEL" python -c "
          import pymcu_rp2040_toolchain as w
          import subprocess
          assert w.is_installed(), f'missing: {w.missing_tools()}'
          opt = w.get_tool('opt')
          print('opt:', opt)
          out = subprocess.run([str(opt), '--version'], capture_output=True, text=True)
          assert out.returncode == 0, out.stderr
          print('Smoke test passed.')
          "

      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum *.whl *.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: List artifacts
        run: ls -lh dist/

  # ---------------------------------------------------------------------------
  # Publish to PyPI via OIDC trusted publishing (no stored token required).
  # Fires only on tag pushes or release events.
  # ---------------------------------------------------------------------------
  publish-pypi:
    name: Publish to PyPI
    needs: collect-and-release
    runs-on: ubuntu-latest
    environment: release
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist/
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          name: dist-sdist
          path: dist/

      - uses: astral-sh/setup-uv@v6

      - name: Publish to PyPI
        run: uv publish dist/*
